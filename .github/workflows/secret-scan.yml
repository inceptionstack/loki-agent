name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  git-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install git-secrets
        run: |
          git clone https://github.com/awslabs/git-secrets.git /tmp/git-secrets
          cd /tmp/git-secrets && sudo make install

      - name: Register AWS patterns
        run: git secrets --register-aws --global

      - name: Scan for secrets
        # Tree-only: history contains legacy patterns that can't be
        # force-pushed away (branch protection). Pre-commit hook
        # catches secrets at author time.
        run: git secrets --scan

name: Inline telemetry into install.sh

on:
  push:
    branches: [main]
    paths:
      - 'lib/telemetry.sh'
      - 'install.sh'
      - 'scripts/build-installer.sh'
      - '.github/workflows/build-installer.yml'

permissions:
  contents: write

concurrency:
  group: build-installer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build install.sh (inline telemetry)
        run: bash scripts/build-installer.sh

      - name: Verify syntax
        run: bash -n install.sh

      - name: Smoke test — pipe through bash stdin (curl|bash equivalent)
        run: |
          # Must not crash under set -euo pipefail when BASH_SOURCE[0] is unset,
          # and must activate telemetry without lib/telemetry.sh on disk.
          mkdir -p /tmp/smoke && cp install.sh /tmp/smoke/install.sh
          awk '/# >>> INLINE: lib\/telemetry.sh/,/# >>> END INLINE <<</' /tmp/smoke/install.sh > /tmp/smoke/inline.sh
          (
            set -euo pipefail
            source /tmp/smoke/inline.sh
            echo "enabled=$_TELEM_ENABLED"
            [[ "$_TELEM_ENABLED" == "true" ]] || { echo "FAIL: telemetry not enabled after inline source"; exit 1; }
            declare -F _telem_install_started >/dev/null || { echo "FAIL: _telem_install_started not defined"; exit 1; }
            declare -F _telem_install_completed >/dev/null || { echo "FAIL: _telem_install_completed not defined"; exit 1; }
            declare -F _telem_install_failed >/dev/null || { echo "FAIL: _telem_install_failed not defined"; exit 1; }
            echo "✅ smoke test passed"
          )

      - name: Commit regenerated install.sh if changed
        run: |
          if git diff --quiet install.sh; then
            echo "install.sh already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add install.sh
          git commit -m "ci: regenerate install.sh (inlined lib/telemetry.sh) [skip ci]"
          git push

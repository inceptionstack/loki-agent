schema_version: 1
id: bedrockify
display_name: Bedrockify
description: OpenAI-compatible proxy for Amazon Bedrock.
experimental: false
allowed_profiles:
  - builder
  - account_assistant
  - personal_assistant
supported_methods:
  - cfn
  - terraform
default_profile: builder
default_method: cfn
default_region: us-east-1
post_install:
  - ssm_session
required_env: []
extra_options_schema:
  model:
    value_type: string
    required: false
    default_value: us.anthropic.claude-opus-4-6-v1
    description: Default Bedrock chat model served by the proxy.
  embed_model:
    value_type: string
    required: false
    default_value: amazon.titan-embed-text-v2:0
    description: Default Bedrock embedding model served by the proxy.
  bedrockify_port:
    value_type: integer
    required: false
    default_value: "8090"
    description: Local port where the proxy listens.
